apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-demand-worker
  namespace: eda-namespace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-demand-worker
  template:
    metadata:
      labels:
        app: celery-demand-worker
    spec:
      containers:
      - name: celery
        image: eda-celery-worker:latest
        command: ["celery"]
        args: ["-A", "tasks.demand_tasks.celery", "worker", "-l", "info", "-Q", "demand_queue"]
        envFrom:
        - configMapRef:
            name: eda-config
        - secretRef:
            name: eda-secret
