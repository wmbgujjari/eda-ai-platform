apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: eda-ingress
  namespace: eda-namespace
spec:
  rules:
  - host: eda.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: fastapi-service
            port:
              number: 8000
